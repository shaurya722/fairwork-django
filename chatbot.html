<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Fair Work Assistant</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
/* ═══════════════════════════════════════════════════════
   Symplify design system (adapted for Fair Work chatbot)
   ═══════════════════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  /* Brand */
  --sky:#D6EAF8;--sky-soft:#EFF6FC;--sky-deep:#8BB8D8;--sky-hover:#C3DEF2;
  --lav:#E6E6FA;--lav-deep:#AAAEDD;--lav-deeper:#8A8FD2;--lav-soft:#F2F2FC;
  /* Ink */
  --ink:#3F3D3D;--ink-2:#616161;--ink-3:#8A8A8A;--ink-4:#ADADAD;--ink-5:#C2C2C2;
  /* Surface */
  --bg:#F8F9FA;--surface:#FFFFFF;--line:#EEEEEE;--line-2:#F6F6F6;
  /* Functional */
  --coral:#D97878;--amber:#B08A3C;--sage:#6B9E7B;
  /* Layout */
  --topbar-h:64px;
  --r:12px;--r-lg:16px;
}

html,body{height:100%}
body{
  font-family:'Inter',system-ui,-apple-system,sans-serif;
  background:var(--bg);color:var(--ink);font-size:14px;line-height:1.5;
  display:flex;flex-direction:column;min-height:100vh;
  -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;
}
h1,h2,h3,h4{font-family:'Manrope',system-ui,sans-serif;letter-spacing:-0.02em;color:var(--ink);font-weight:700}

/* ── LAYOUT ── */
.app-layout{
  flex:1;display:grid;grid-template-columns:300px 1fr;min-height:0;overflow:hidden;
}
@media (max-width:768px){
  .app-layout{grid-template-columns:1fr}
  .sidebar-col{display:none}
}

/* ── SIDEBAR ── */
.sidebar-col{
  background:#fff;border-right:1px solid var(--line);
  display:flex;flex-direction:column;overflow:hidden;
}
.sb-head{
  padding:16px 18px 12px;border-bottom:1px solid var(--line);
  display:flex;justify-content:space-between;align-items:center;flex-shrink:0;
}
.sb-title{font-family:'Manrope',sans-serif;font-size:18px;font-weight:700;color:var(--ink);letter-spacing:-.01em}
.sb-compose{
  width:32px;height:32px;border-radius:8px;background:var(--lav-deep);color:#fff;
  border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;
  font-size:20px;font-weight:700;line-height:1;font-family:inherit;
}
.sb-compose:hover{background:var(--lav-deeper)}
.sb-search{padding:10px 14px;border-bottom:1px solid var(--line);flex-shrink:0}
.sb-search-box{
  display:flex;align-items:center;gap:8px;background:var(--bg);
  border:1px solid var(--line);border-radius:8px;padding:0 10px;height:34px;
}
.sb-search-box svg{width:14px;height:14px;color:var(--ink-4);flex-shrink:0}
.sb-search-box input{flex:1;border:none;outline:none;background:transparent;font-family:inherit;font-size:13px;color:var(--ink)}
.sb-search-box input::placeholder{color:var(--ink-4)}
.session-list{flex:1;overflow-y:auto}
.session-item{
  display:flex;align-items:center;gap:11px;padding:12px 16px;
  cursor:pointer;border-bottom:1px solid var(--line-2);position:relative;
}
.session-item:hover{background:var(--bg)}
.session-item.active{background:var(--lav-soft)}
.session-item.active::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--lav-deep)}
.sess-av{
  width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:700;color:#fff;flex-shrink:0;
}
.sess-body{flex:1;min-width:0}
.sess-top{display:flex;justify-content:space-between;align-items:center;gap:8px}
.sess-name{font-size:13.5px;font-weight:700;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sess-time{font-size:11px;color:var(--ink-3);white-space:nowrap;flex-shrink:0}
.sess-preview{font-size:12px;color:var(--ink-3);margin-top:2px;line-height:1.35;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sess-count{font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px;background:var(--lav);color:var(--lav-deeper);margin-left:6px;flex-shrink:0}
.sess-empty{padding:24px 16px;text-align:center;color:var(--ink-3);font-size:13px}

/* Delete button inside session items (hover-reveal trash) */
.session-item .delete-btn{
  position:absolute;right:8px;top:50%;transform:translateY(-50%);
  display:none;align-items:center;justify-content:center;
  width:26px;height:26px;border:none;background:transparent;
  color:var(--ink-4);cursor:pointer;border-radius:6px;padding:3px;
  transition:color .12s,background .12s;
}
.session-item:hover .delete-btn{display:flex}
.session-item .delete-btn:hover{color:var(--coral);background:#FFF0F0}

/* ── TOPBAR ── */
.topbar{
  height:var(--topbar-h);background:#fff;
  border-bottom:1px solid var(--line);
  display:flex;align-items:center;gap:16px;padding:0 28px;
  position:sticky;top:0;z-index:40;flex-shrink:0;
}
.topbar .brand{display:flex;align-items:center;gap:12px}
.topbar .brand .logo{
  width:36px;height:36px;border-radius:10px;background:var(--lav-deep);
  display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;
}
.topbar .brand .title{font-size:15px;font-weight:700}
.topbar .brand .sub{font-size:12px;color:var(--ink-3);font-weight:500}
.topbar .spacer{flex:1}
.topbar .status{
  display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--ink-3);
}
.topbar .status .dot{width:8px;height:8px;border-radius:50%;background:var(--sage)}
.topbar .new-chat{
  padding:8px 14px;border-radius:9px;font-size:13px;font-weight:600;
  background:#fff;color:var(--ink-2);border:1px solid var(--line);
  cursor:pointer;font-family:inherit;transition:all .15s;
}
.topbar .new-chat:hover{background:var(--bg);border-color:var(--ink-5)}

/* ── CHAT CONTAINER ── */
.chat-container{
  flex:1;display:flex;flex-direction:column;min-height:0;
  width:100%;
  background:var(--surface);
}

.thread{
  flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg);
}

.thread-head{
  background:#fff;border-bottom:1px solid var(--line);
  padding:14px 24px;display:flex;align-items:center;gap:12px;flex-shrink:0;
}
.thread-head .conv-av{
  width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:15px;font-weight:700;color:#fff;flex-shrink:0;
}
.thread-head .tn{font-family:'Manrope',sans-serif;font-size:15px;font-weight:700;color:var(--ink)}
.thread-head .ts{font-size:12.5px;color:var(--ink-3);margin-top:1px}

.thread-body{
  flex:1;overflow-y:auto;padding:28px 32px;display:flex;flex-direction:column;gap:16px;
  scroll-behavior:smooth;
}
.thread-body::-webkit-scrollbar{width:6px}
.thread-body::-webkit-scrollbar-thumb{background:rgba(63,61,61,.15);border-radius:3px}

/* Messages */
.msg{display:flex;gap:10px;max-width:78%}
.msg.self{margin-left:auto;flex-direction:row-reverse}
.msg-av{
  width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:700;color:#fff;flex-shrink:0;margin-top:2px;
}
.msg-bubble{
  background:#fff;border:1px solid var(--line);border-radius:14px;
  padding:12px 16px;font-size:14px;color:var(--ink);line-height:1.55;
  max-width:100%;
}
.msg.self .msg-bubble{
  background:var(--lav-deep);color:#fff;border-color:var(--lav-deep);
}
.msg-time{
  font-size:11px;color:var(--ink-4);margin-top:6px;font-weight:500;
}
.msg.self .msg-time{text-align:right}

/* Day separator */
.day-sep{
  text-align:center;font-size:11.5px;color:var(--ink-4);font-weight:600;
  text-transform:uppercase;letter-spacing:.08em;padding:6px 0;position:relative;
}
.day-sep::before,.day-sep::after{content:"";position:absolute;top:50%;width:60px;height:1px;background:var(--line-2)}
.day-sep::before{left:calc(50% - 90px)}
.day-sep::after{right:calc(50% - 90px)}

/* Sources inside bubble */
.sources{margin-top:12px;padding-top:10px;border-top:1px solid var(--line)}
.msg.self .sources{border-top-color:rgba(255,255,255,.35)}
.sources-label{font-size:11px;font-weight:700;color:var(--ink-3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.source-chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{
  display:inline-flex;align-items:center;gap:5px;padding:4px 9px;border-radius:8px;
  background:var(--line-2);border:1px solid var(--line);font-size:12px;color:var(--ink-2);
  text-decoration:none;cursor:pointer;transition:all .15s;
}
.msg.self .chip{background:rgba(255,255,255,.2);border-color:rgba(255,255,255,.3);color:#fff}
.chip:hover{border-color:var(--lav-deep);color:var(--lav-deeper)}
.msg.self .chip:hover{border-color:#fff;color:#fff}
.chip-num{
  width:15px;height:15px;border-radius:50%;background:var(--lav-deep);color:#fff;
  display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;
}
.msg.self .chip-num{background:rgba(255,255,255,.35);color:#fff}

/* Meta row */
.meta-row{font-size:11px;color:var(--ink-4);margin-top:8px;display:flex;gap:10px;flex-wrap:wrap}
.msg.self .meta-row{color:rgba(255,255,255,.7)}

/* Typing */
.typing{display:flex;gap:10px}
.typing .msg-bubble{display:flex;align-items:center;gap:5px;padding:12px 16px}
.dot{width:6px;height:6px;border-radius:50%;background:var(--ink-4);animation:bounce 1.2s infinite}
.dot:nth-child(2){animation-delay:.2s}
.dot:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:.5}30%{transform:translateY(-4px);opacity:1}}

/* Composer */
.composer{background:#fff;border-top:1px solid var(--line);padding:14px 20px;flex-shrink:0}
.comp-box{display:flex;align-items:flex-end;gap:10px;background:var(--bg);border:1px solid var(--line);border-radius:14px;padding:10px 14px}
.comp-box:focus-within{border-color:var(--sky-deep);background:#fff}
.comp-text{flex:1;min-height:22px;max-height:140px;border:none;outline:none;background:transparent;font-family:inherit;font-size:14.5px;color:var(--ink);resize:none}
.comp-tools{display:flex;gap:4px;align-items:center}
.comp-tool{width:30px;height:30px;border-radius:8px;border:none;background:transparent;color:var(--ink-3);cursor:pointer;display:flex;align-items:center;justify-content:center}
.comp-tool:hover{color:var(--lav-deeper);background:var(--lav-soft)}
.comp-send{padding:8px 16px;background:var(--lav-deep);color:#fff;border:none;border-radius:9px;font-family:inherit;font-size:13.5px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px;transition:background .15s}
.comp-send:hover{background:var(--lav-deeper)}
.comp-send svg{width:14px;height:14px}
.comp-hint{font-size:11.5px;color:var(--ink-4);margin-top:8px;display:flex;justify-content:space-between}

/* Welcome */
.welcome{text-align:center;padding:60px 20px 40px;animation:fadeUp .4s ease}
.welcome-icon{font-size:42px;margin-bottom:16px}
.welcome h2{font-family:'Manrope',sans-serif;font-size:22px;font-weight:800;margin-bottom:8px}
.welcome p{color:var(--ink-3);font-size:14px;max-width:420px;margin:0 auto 24px;line-height:1.6}
.suggestions{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;max-width:620px;margin:0 auto}
.suggestion-btn{padding:8px 14px;border:1px solid var(--line);border-radius:999px;background:#fff;color:var(--ink-2);font-family:'Inter',sans-serif;font-size:13px;cursor:pointer;transition:all .15s}
.suggestion-btn:hover{background:var(--lav-soft);border-color:var(--lav-deep);color:var(--lav-deeper)}

@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* Error */
.error-bubble{background:#fff0f0;border-color:#f5d0d0;color:#9f3a3a}

/* Avatars gradients */
.gr-lav{background:linear-gradient(135deg,#AAAEDD,#CACEEC)}
.gr-sky{background:linear-gradient(135deg,#8BB8D8,#C3DEF2)}
.gr-coral{background:linear-gradient(135deg,#D97878,#F2B5B5)}
.gr-sage{background:linear-gradient(135deg,#6B9E7B,#A8C8B4)}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <div class="logo">⚖️</div>
    <div>
      <div class="title">Fair Work Assistant</div>
      <div class="sub">SCHADS Award • MA000100</div>
    </div>
  </div>
  <div class="spacer"></div>
  <div class="status">
    <span class="dot"></span>
    <span>Connected</span>
  </div>
  <button class="new-chat" onclick="newChat()">+ New chat</button>
</div>

<div class="app-layout">
  <!-- Session sidebar -->
  <aside class="sidebar-col">
    <div class="sb-head">
      <div class="sb-title">Chats</div>
      <button class="sb-compose" onclick="newChat()" title="New chat">+</button>
    </div>
    <div class="sb-search">
      <div class="sb-search-box">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;color:var(--ink-4);flex-shrink:0">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input id="session-search" placeholder="Search sessions…" oninput="filterSessions(this.value)">
      </div>
    </div>
    <div class="session-list" id="session-list">
      <div class="sess-empty">Loading sessions…</div>
    </div>
  </aside>

  <!-- Main chat -->
  <div class="chat-container">
    <div class="thread">
      <div class="thread-head">
        <div class="conv-av gr-lav">FW</div>
        <div>
          <div class="tn">Fair Work Assistant</div>
          <div class="ts">SCHADS Award expert • Ready to help</div>
        </div>
      </div>

      <div class="thread-body" id="chat-window">
      <!-- Messages injected here by JS -->
      <div class="welcome" id="welcome">
        <div class="welcome-icon">⚖️</div>
        <h2>Fair Work Q&amp;A</h2>
        <p>Ask anything about the SCHADS Award — penalty rates, overtime, leave entitlements, and more.</p>
        <div class="suggestions">
          <button class="suggestion-btn" onclick="sendSuggestion(this)">What are Sunday penalty rates?</button>
          <button class="suggestion-btn" onclick="sendSuggestion(this)">How does overtime work for casuals?</button>
          <button class="suggestion-btn" onclick="sendSuggestion(this)">What is the minimum shift engagement?</button>
          <button class="suggestion-btn" onclick="sendSuggestion(this)">Explain Saturday shift allowances</button>
          <button class="suggestion-btn" onclick="sendSuggestion(this)">What are the public holiday rates?</button>
        </div>
      </div>
    </div>

    <div class="composer">
      <div class="comp-box">
        <textarea class="comp-text" id="msg-input" rows="1" placeholder="Ask about Fair Work entitlements…"></textarea>
        <div class="comp-tools">
          <button class="comp-send" id="send-btn" onclick="sendMessage()">
            Send
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
          </button>
        </div>
      </div>
      <div class="comp-hint">
        <span>⏎ to send · Shift+⏎ for new line</span>
        <span></span>
      </div>
    </div>
  </div>
</div>

</div>

<script>
  const API_URL = 'http://192.168.3.154:8000/api/chat/';
  const HISTORY_URL = API_URL + 'history/';
  const SESSIONS_URL = API_URL + 'sessions/';
  const chatWindow = document.getElementById('chat-window');
  const input = document.getElementById('msg-input');
  const sendBtn = document.getElementById('send-btn');

  function newSessionId() {
    return (window.crypto && crypto.randomUUID)
      ? crypto.randomUUID()
      : 'sess-' + Date.now().toString(36) + Math.random().toString(36).slice(2);
  }
  let SESSION_ID = localStorage.getItem('fw_session_id');
  if (!SESSION_ID) {
    SESSION_ID = newSessionId();
    localStorage.setItem('fw_session_id', SESSION_ID);
  }
  const WELCOME_HTML = chatWindow.innerHTML;

  // Auto-grow textarea
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 140) + 'px';
  });

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  function sendSuggestion(btn) {
    input.value = btn.textContent.trim();
    sendMessage();
  }

  function hideWelcome() {
    const w = document.getElementById('welcome');
    if (w) w.remove();
  }

  function scrollToBottom() {
    chatWindow.scrollTop = chatWindow.scrollHeight;
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function addUserBubble(text) {
    hideWelcome();
    const row = document.createElement('div');
    row.className = 'msg self';
    row.innerHTML = `
      <div>
        <div class="msg-bubble">${escHtml(text)}</div>
        <div class="msg-time">Just now</div>
      </div>
      <div class="msg-av gr-lav">You</div>
    `;
    chatWindow.appendChild(row);
    scrollToBottom();
  }

  function addTypingIndicator() {
    const row = document.createElement('div');
    row.className = 'typing';
    row.id = 'typing';
    row.innerHTML = `
      <div class="msg-av gr-lav">FW</div>
      <div class="msg-bubble">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
      </div>
    `;
    chatWindow.appendChild(row);
    scrollToBottom();
    return row;
  }

  function removeTyping() {
    const t = document.getElementById('typing');
    if (t) t.remove();
  }

  function addBotBubble(data) {
    const row = document.createElement('div');
    row.className = 'msg';

    const sourcesHtml = buildSources(data.sources || []);
    const metaHtml = buildMeta(data.meta || {});

    row.innerHTML = `
      <div class="msg-av gr-lav">FW</div>
      <div>
        <div class="msg-bubble">
          <div>${escHtml(data.answer).replace(/\n/g, '<br>')}</div>
          ${sourcesHtml}
          ${metaHtml}
        </div>
        <div class="msg-time">Just now</div>
      </div>
    `;
    chatWindow.appendChild(row);
    scrollToBottom();
  }

  function addErrorBubble(msg) {
    const row = document.createElement('div');
    row.className = 'msg';
    row.innerHTML = `
      <div class="msg-av gr-coral">!</div>
      <div>
        <div class="msg-bubble error-bubble">${escHtml(msg)}</div>
      </div>
    `;
    chatWindow.appendChild(row);
    scrollToBottom();
  }

  function buildSources(sources) {
    if (!sources.length) return '';
    const chips = sources.map((s, i) => `
      <a class="chip" href="${escHtml(s.source_url)}" target="_blank" rel="noopener" title="${escHtml(s.excerpt || '')}">
        <span class="chip-num">${i + 1}</span>
        Clause ${escHtml(s.clause_no)} · ${escHtml(s.title)}
      </a>`).join('');
    return `<div class="sources">
      <div class="sources-label">Sources</div>
      <div class="source-chips">${chips}</div>
    </div>`;
  }

  function buildMeta(meta) {
    if (!Object.keys(meta).length) return '';
    const parts = [];
    if (meta.chat_model) parts.push(`<span>Model: ${meta.chat_model}</span>`);
    if (meta.total_ms)   parts.push(`<span>${meta.total_ms}ms</span>`);
    if (meta.matches_found !== undefined) parts.push(`<span>${meta.matches_found} matches</span>`);
    return `<div class="meta-row">${parts.join(' • ')}</div>`;
  }

  async function restoreHistory() {
    try {
      const res = await fetch(HISTORY_URL + '?session_id=' + encodeURIComponent(SESSION_ID));
      if (!res.ok) return;
      const data = await res.json();
      let rows = Array.isArray(data) ? data : (data.results || []);
      rows = rows.filter(r => r.success !== false).slice(0, 30).reverse();
      for (const row of rows) {
        // user
        const u = document.createElement('div');
        u.className = 'msg self';
        u.innerHTML = `
          <div>
            <div class="msg-bubble">${escHtml(row.question)}</div>
          </div>
          <div class="msg-av gr-lav">You</div>
        `;
        chatWindow.appendChild(u);

        // bot
        const b = document.createElement('div');
        b.className = 'msg';
        const src = buildSources(row.sources || []);
        const mta = buildMeta({
          chat_model: row.chat_model,
          total_ms: row.total_ms,
          matches_found: row.matches_found
        });
        b.innerHTML = `
          <div class="msg-av gr-lav">FW</div>
          <div>
            <div class="msg-bubble">
              <div>${escHtml(row.answer).replace(/\n/g, '<br>')}</div>
              ${src}
              ${mta}
            </div>
          </div>
        `;
        chatWindow.appendChild(b);
      }
      scrollToBottom();
    } catch (err) {
      /* offline or no history */
    }
  }

  function newChat() {
    SESSION_ID = newSessionId();
    localStorage.setItem('fw_session_id', SESSION_ID);
    chatWindow.innerHTML = WELCOME_HTML;
    input.value = '';
    input.style.height = 'auto';
    input.focus();
    // Clear active session highlight in sidebar
    document.querySelectorAll('.session-item.active').forEach(el => el.classList.remove('active'));
    // Refresh session list so the new empty session appears next time
    loadSessions();
  }

  async function sendMessage() {
    const text = input.value.trim();
    if (!text) return;

    input.value = '';
    input.style.height = 'auto';
    sendBtn.disabled = true;

    addUserBubble(text);
    const typingRow = addTypingIndicator();

    try {
      const res = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, session_id: SESSION_ID })
      });

      removeTyping();

      if (!res.ok) {
        addErrorBubble(`Server error: ${res.status} ${res.statusText}`);
        return;
      }

      const data = await res.json();

      if (!data.success) {
        addErrorBubble(data.error || 'Something went wrong. Please try again.');
        return;
      }

      addBotBubble(data);
      // Refresh sidebar so the current session moves to top with updated preview
      loadSessions();

    } catch (err) {
      removeTyping();
      addErrorBubble(`Could not connect to the API at ${API_URL} — make sure the server is reachable on your network.`);
      console.error(err);
    } finally {
      sendBtn.disabled = false;
      input.focus();
    }
  }

  // ── Session sidebar ──
  let allSessions = [];

  function formatTime(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    const now = new Date();
    const diffMs = now - d;
    const diffMin = Math.floor(diffMs / 60000);
    const diffHr  = Math.floor(diffMs / 3600000);
    const diffDay = Math.floor(diffMs / 86400000);
    if (diffMin < 1) return 'Just now';
    if (diffMin < 60) return diffMin + 'm';
    if (diffHr < 24) return diffHr + 'h';
    if (diffDay === 1) return 'Yesterday';
    if (diffDay < 7) return diffDay + 'd';
    return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
  }

  function renderSessionList(sessions) {
    const container = document.getElementById('session-list');
    if (!sessions.length) {
      container.innerHTML = '<div class="sess-empty">No sessions yet</div>';
      return;
    }
    container.innerHTML = sessions.map(s => {
      const isActive = s.session_id === SESSION_ID;
      const title = s.preview || (s.session_id ? 'Session ' + s.session_id.slice(0,8) : 'New chat');
      return `
        <div class="session-item ${isActive ? 'active' : ''}" data-sid="${escHtml(s.session_id)}" onclick="openSession(this.dataset.sid)">
          <div class="sess-av gr-lav">FW</div>
          <div class="sess-body">
            <div class="sess-top">
              <span class="sess-name">${escHtml(title).slice(0,60)}</span>
              <span class="sess-time">${escHtml(formatTime(s.last_message_at))}</span>
            </div>
            <div class="sess-preview">${s.message_count} message${s.message_count !== 1 ? 's' : ''}</div>
          </div>
          <button class="delete-btn" title="Delete session" onclick="deleteSession(this.dataset.sid, event)" data-sid="${escHtml(s.session_id)}">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
          </button>
        </div>
      `;
    }).join('');
  }

  async function loadSessions() {
    try {
      const res = await fetch(SESSIONS_URL + '?page=1&limit=50');
      if (!res.ok) return;
      const data = await res.json();
      allSessions = data.results || [];
      renderSessionList(allSessions);
    } catch (err) {
      console.error('Failed to load sessions', err);
    }
  }

  function filterSessions(query) {
    const q = query.toLowerCase().trim();
    if (!q) {
      renderSessionList(allSessions);
      return;
    }
    const filtered = allSessions.filter(s =>
      (s.preview || '').toLowerCase().includes(q) ||
      (s.session_id || '').toLowerCase().includes(q)
    );
    renderSessionList(filtered);
  }

  async function openSession(sid) {
    if (!sid) return;
    SESSION_ID = sid;
    localStorage.setItem('fw_session_id', SESSION_ID);
    // Update sidebar active state
    document.querySelectorAll('.session-item.active').forEach(el => el.classList.remove('active'));
    const el = document.querySelector('.session-item[data-sid="' + CSS.escape(sid) + '"], .session-item[data-sid="' + sid.replace(/"/g, '\\"') + '"]');
    if (el) el.classList.add('active');
    // Load thread
    chatWindow.innerHTML = WELCOME_HTML;
    await restoreHistory();
    input.focus();
  }

  async function deleteSession(sid, ev) {
    if (!sid) return;
    if (ev) ev.stopImmediatePropagation();

    const ok = confirm('Delete this session and all its messages?');
    if (!ok) return;

    try {
      const res = await fetch(SESSIONS_URL + encodeURIComponent(sid) + '/', { method: 'DELETE' });
      if (!res.ok && res.status !== 204) {
        console.error('Delete failed', res.status);
        return;
      }

      // Remove from local list
      allSessions = allSessions.filter(s => s.session_id !== sid);

      // If we just deleted the active session, start fresh
      if (SESSION_ID === sid) {
        SESSION_ID = newSessionId();
        localStorage.setItem('fw_session_id', SESSION_ID);
        chatWindow.innerHTML = WELCOME_HTML;
        document.querySelectorAll('.session-item.active').forEach(el => el.classList.remove('active'));
      }

      renderSessionList(allSessions);
    } catch (err) {
      console.error('Failed to delete session', err);
    }
  }

  restoreHistory();
  loadSessions();
  input.focus();
</script>
</body>
</html>
